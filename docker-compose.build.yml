# Override для локальной сборки образов из исходников.
# Использование (из корня репозитория):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
services:
  backend:
    build:
      context: ./backend

  frontend:
    build:
      context: ./frontend
      args:
        NUXT_PUBLIC_SUBSCRIPTION_CRYPTO_PATH: ${SUBSCRIPTION_CRYPTO_PATH_SEGMENT}
