# Скопируйте на сервер:
#   sudo cp nginx/sites-available/inv.avtlk.ru.conf /etc/nginx/sites-available/inv.avtlk.ru
#   sudo ln -sf /etc/nginx/sites-available/inv.avtlk.ru /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# После certbot на 443 в этот же server обычно добавляют listen 443 ssl и сертификаты.

server {
  listen 80;
  listen [::]:80;
  server_name inv.avtlk.ru;

  client_max_body_size 20m;

  # Nuxt Icon (если в сборке ещё дефолтный путь /api/_nuxt_icon — иначе запрос уйдёт в Nest → 404).
  # При localApiEndpoint: /_nuxt_icon этот блок не обязателен, но полезен для старых билдов или кэша.
  location /api/_nuxt_icon/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://127.0.0.1:3001;
  }

  # Backend: https://inv.avtlk.ru/api/*
  # префикс /api/ снимается перед проксированием в NestJS
  location /api/ {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://127.0.0.1:3000/;
  }

  # Frontend: Nuxt (Nitro)
  location / {
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
    proxy_pass http://127.0.0.1:3001;
  }
}
