# Полный стек: MongoDB, Redis, NestJS backend, Nuxt frontend.
#
# Быстрый старт (образы скачиваются с GHCR):
#   cp .env.example .env
#   # Отредактируйте .env (JWT_SECRET, REDIS_PASSWORD, FRONTEND_ORIGIN и др.)
#   docker compose pull
#   docker compose up -d
#
# Локальная сборка из исходников (нужен клон репозитория):
#   docker compose -f docker-compose.yml -f docker-compose.build.yml up -d --build
#
# Инициализация MongoDB replica set (один раз после первого запуска):
#   docker compose exec mongodb mongo --quiet --eval \
#     'try{rs.status()}catch(e){rs.initiate({_id:"rs0",members:[{_id:0,host:"mongodb:27017"}]})}'

services:
  # ─── Инфраструктура ──────────────────────────────────────────────────────────

  # mongo:7 на части VPS падает с Restarting (132) — SIGILL, старый CPU без нужных инструкций.
  mongodb:
    image: mongo:4.4
    restart: unless-stopped
    command: ["mongod", "--replSet", "rs0", "--bind_ip_all"]
    volumes:
      - mongo_data:/data/db
    networks:
      - subscribe-net
    healthcheck:
      test: ["CMD-SHELL", "mongo --quiet --eval 'db.adminCommand({ping:1})' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 15
      start_period: 10s

  redis:
    image: redis:7.2-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${REDIS_PASSWORD}"]
    volumes:
      - redis_data:/data
    networks:
      - subscribe-net
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  # ─── Приложения ──────────────────────────────────────────────────────────────

  backend:
    image: ghcr.io/${GITHUB_REPO:-mr-abdrahimov/subscribe-panel}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      # MongoDB: подключение внутри Docker-сети по имени сервиса.
      DATABASE_URL: mongodb://mongodb:27017/${MONGO_DATABASE:-subscribe_panel}?replicaSet=rs0
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-7d}
      FRONTEND_ORIGIN: ${FRONTEND_ORIGIN}
      PUBLIC_SUBSCRIPTION_BASE_URL: ${PUBLIC_SUBSCRIPTION_BASE_URL:-}
      SUBSCRIPTION_CRYPTO_PATH_SEGMENT: ${SUBSCRIPTION_CRYPTO_PATH_SEGMENT:-sub2128937123}
      SWAGGER_PATH: ${SWAGGER_PATH:-docs}
      SWAGGER_TITLE: ${SWAGGER_TITLE:-Subscribe Panel API}
      SWAGGER_DESCRIPTION: ${SWAGGER_DESCRIPTION:-}
      SWAGGER_VERSION: ${SWAGGER_VERSION:-1.0.0}
      BULL_BOARD_ENABLED: ${BULL_BOARD_ENABLED:-false}
      BULL_BOARD_TOKEN: ${BULL_BOARD_TOKEN:-}
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-System Admin}
      TELEGRAM_NOTIFY_SUBSCRIPTION_ACCESS: ${TELEGRAM_NOTIFY_SUBSCRIPTION_ACCESS:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      # Доступен только с localhost — nginx делает reverse proxy на этот порт.
      - "127.0.0.1:${BACKEND_PORT:-3000}:3000"
    networks:
      - subscribe-net

  frontend:
    image: ghcr.io/${GITHUB_REPO:-mr-abdrahimov/subscribe-panel}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      # Внутренний URL backend для Nitro SSR (server-side fetch).
      NUXT_API_INTERNAL_BASE_URL: http://backend:3000
      # Публичный URL API для браузера (должен быть доступен снаружи).
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-}
      NUXT_PUBLIC_ADMIN_EMAIL: ${ADMIN_EMAIL}
      NUXT_PUBLIC_ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # Prisma (FrontendSession): тот же MongoDB что и backend.
      DATABASE_URL: mongodb://mongodb:27017/${MONGO_DATABASE:-subscribe_panel}?replicaSet=rs0
    ports:
      - "127.0.0.1:${FRONTEND_PORT:-3001}:3000"
    networks:
      - subscribe-net

networks:
  subscribe-net:
    driver: bridge

volumes:
  mongo_data:
  redis_data:
