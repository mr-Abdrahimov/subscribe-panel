# Сборка и публикация Docker-образов в GitHub Container Registry (GHCR).
#
# Образы сохраняются как:
#   ghcr.io/<owner>/<repo>/backend:latest
#   ghcr.io/<owner>/<repo>/frontend:latest
#
# Теги: latest (main), имя ветки, semver-версия (v1.2.3 → 1.2.3).
#
# Требуется разрешить запись в Packages: Settings → Actions → General →
# Workflow permissions → Read and write permissions.

name: Build & Push Docker images

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  # Ручной запуск из GitHub UI.
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository → "owner/repo"
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  # ─── Backend ────────────────────────────────────────────────────────────────
  backend:
    name: Backend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    name: Frontend image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix=sha-,format=short

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # build-args не нужны: NUXT_PUBLIC_* переопределяются через env контейнера в runtime.
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
